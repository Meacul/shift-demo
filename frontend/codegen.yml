schema: http://localhost:10000/graphql           # or a local .graphql file
documents: src/**/*.tsx                 # where your gql`` tags live
generates:
  src/generated/graphql.ts:
    plugins:
      - typescript
      - typescript-operations
      - typescript-react-apollo
    config:
      withHooks: true          # `useGetWorkersQuery` etc.
      addDocBlocks: false